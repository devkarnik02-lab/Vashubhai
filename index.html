<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASHU BHAI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #111, #000);
  color:white;
  overflow-x:hidden;
}

/* Floating Background */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(0,255,100,0.15), transparent);
  animation: move 6s infinite alternate;
}

@keyframes move {
  from { transform: translateY(0px); }
  to { transform: translateY(30px); }
}

/* Glass Card */
.container {
  margin:40px 15px;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  text-align:center;
}

/* Title */
h1 {
  font-size:32px;
}

p {
  color:#bbb;
}

/* Buttons */
.btn {
  display:block;
  margin:20px auto;
  padding:16px;
  width:90%;
  border-radius:50px;
  text-decoration:none;
  color:white;
  font-size:18px;
  font-weight:bold;
  position:relative;
  overflow:hidden;
}

/* Main Button */
.btn-main {
  background: linear-gradient(90deg, #00ff99, #ff0033);
  animation: pulse 2s infinite;
}

/* Second Button */
.btn-second {
  background: linear-gradient(90deg, gold, orange);
  animation: glow 2s infinite;
}

@keyframes pulse {
  0% {transform:scale(1);}
  50% {transform:scale(1.06);}
  100% {transform:scale(1);}
}

@keyframes glow {
  0% {box-shadow:0 0 10px gold;}
  50% {box-shadow:0 0 25px orange;}
  100% {box-shadow:0 0 10px gold;}
}

/* Shine */
.btn::before {
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
  transition:0.6s;
}

.btn:hover::before {
  left:100%;
}

/* Features */
.features {
  margin-top:20px;
}

.card {
  background:#111;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
}

/* Popup */
.popup {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:15px;
  border-radius:12px;
  display:none;
}

.popup a {
  color:#00ff99;
  text-decoration:none;
  font-weight:bold;
}

/* Show popup */
.show {
  display:block;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
<h1>VASHU BHAI</h1>
<p>Cricket Insights & Live Match Updates</p>

<a class="btn btn-main" href="https://t.me/+2V8_E0bCY_1hMDhl">
📲 Join Free Telegram Channel
</a>

<a class="btn btn-second" href="https://rummyloot.in?from_gameid=8979123&channelCode=8959779">
🎁 Get Free Bonus App
</a>

<div class="features">
  <div class="card">🔥 Live Match Insights</div>
  <div class="card">📊 Smart Analysis</div>
  <div class="card">👥 Active Community</div>
  <div class="card">⚡ Real-Time Updates</div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
Join our Telegram for free updates 👉 
<a href="https://t.me/+2V8_E0bCY_1hMDhl">Join Now</a>
</div>

<script>
setTimeout(function(){
  document.getElementById("popup").classList.add("show");
}, 4000);
</script>

</body>
</html>
